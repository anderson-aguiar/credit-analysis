spring:
  application:
    name: ms-scoring

  # Configuração do MongoDB
  data:
    mongodb:
      host: localhost
      port: 27017
      database: credit-db
      auto-index-creation: false

    # Configuração do Redis (Cache de Score)
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  cloud:
    stream:
      # Define Kafka como binder padrão
      default-binder: kafka

      kafka:
        binder:
          brokers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
          auto-create-topics: true
          required-acks: 1

      bindings: {}

camunda:
  bpm:
    client:
      base-url: http://localhost:8080/engine-rest
      lock-duration: 60000
      async-response-timeout: 10000
      worker-id: ms-scoring-worker
      max-tasks: 10

server:
  port: 8082

# Configurações customizadas para cálculo de score
scoring:
  cache:
    ttl-hours: 24
  weights:
    payment-history: 0.40
    income: 0.30
    debt: 0.20
    relationship: 0.10
