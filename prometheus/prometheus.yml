global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: 'credit-analysis-system'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets:
          - 'host.docker.internal:8081' # ms-credit
          - 'host.docker.internal:8082' # ms-scoring
          - 'host.docker.internal:8083' # ms-fraud
          - 'host.docker.internal:8084' # ms-notifications
          - 'host.docker.internal:8085' # camunda-starter

    # Isso ajuda a identificar qual instância enviou a métrica no Grafana
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        regex: 'host.docker.internal:(.*)'
        replacement: 'ms-$1'
