spring:
  application:
    name: ms-credit

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  cloud:
    stream:
      kafka:
        binder:
          brokers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
      bindings:
        creditRequested-out-0:
          destination: credit-requested
          content-type: application/json

server:
  port: 8081

# Configurações customizadas
credit:
  rate-limit:
    max-requests: 3
    window-hours: 24

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: always
    metrics:
      enabled: true
    prometheus:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
    export:
      prometheus:
        enabled: true
  tracing:
    sampling:
      probability: 1.0

# Informações da aplicação (aparece no /actuator/info)
info:
  app:
    name: ${spring.application.name}
    description: Credit Analysis System
    version: 1.0.0