server:
  port: 8083
spring:
  application:
    name: ms-fraud
  # PostgreSQL
  datasource:
    url: jdbc:postgresql://localhost:5432/fraud_db
    username: postgres
    password: postgres123
    driver-class-name: org.postgresql.Driver

  jpa:
    # Dialeto explícito para evitar que o Hibernate tente adivinhar sem conexão
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  cloud:
    stream:
      default-binder: kafka

      kafka:
        binder:
          brokers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
          auto-create-topics: true

      bindings: {}
      # Não vai consumir Kafka diretamente
      # Será chamado via REST pelo Camunda

camunda:
  bpm:
    client:
      base-url: http://localhost:8080/engine-rest
      lock-duration: 60000
      async-response-timeout: 10000
      worker-id: ms-fraud-worker
      max-tasks: 10


# Configurações de validação de fraude
fraud:
  validation:
    max-amount-ratio: 2.0
    min-income-ratio: 0.3

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: always
    metrics:
      enabled: true
    prometheus:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
    export:
      prometheus:
        enabled: true
  tracing:
    sampling:
      probability: 1.0

# Informações da aplicação (aparece no /actuator/info)
info:
  app:
    name: ${spring.application.name}
    description: Credit Analysis System
    version: 1.0.0